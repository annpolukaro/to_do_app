services:

  to_do_app-postgres:
    image: postgres:18.1-bookworm
    container_name: to_do_app-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
    - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always

  to_do_app-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: to-do-app-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:to_do_app-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"
